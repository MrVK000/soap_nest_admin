<div class="customers-container">
    <h2 class="page-title text-center">Customers Management</h2>

    <div class="action-options flex">
        <p-iconfield>
            <p-inputicon styleClass="pi pi-search" />
            <input pInputText type="text" placeholder="Search by name, email, or phone..." [(ngModel)]="searchTerm" />
        </p-iconfield>
    </div>

    <div class="table-wrapper">
        <p-table [value]="filteredCustomers()" [paginator]="true" [rows]="rows" [rowsPerPageOptions]="[5, 10, 20]"
            [lazy]="true" [totalRecords]="totalRecords" [loading]="loading" [responsiveLayout]="'scroll'"
            [paginatorDropdownAppendTo]="'body'" (onPage)="onPageChange($event)">
            <ng-template pTemplate="header">
                <tr>
                    <th>
                        <p class="flex justify-content-center">Name</p>
                    </th>
                    <th>
                        <p class="flex justify-content-center">Email</p>
                    </th>
                    <th>
                        <p class="flex justify-content-center">Phone</p>
                    </th>
                    <th>
                        <p class="flex justify-content-center">Address</p>
                    </th>
                    <th>
                        <p class="flex justify-content-center">Joined On</p>
                    </th>
                    <th>
                        <p class="flex justify-content-center">Actions</p>
                    </th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-customer>
                <tr>
                    <td>
                        <p class="flex justify-content-center">{{ customer.name }}</p>
                    </td>
                    <td>
                        <p class="flex justify-content-center">{{ customer.email }}</p>
                    </td>
                    <td>
                        <p class="flex justify-content-center">{{ customer.phone }}</p>
                    </td>
                    <td>
                        <p class="flex justify-content-center">{{ customer.address }}</p>
                    </td>
                    <td>
                        <p class="flex justify-content-center">{{ customer.createdAt | date}}</p>
                    </td>
                    <td class="flex flex-wrap justify-content-center">
                        <p-button label="View" icon="pi pi-eye" (onClick)="viewCustomer(customer.customerId)"
                            styleClass="view-btn" [text]="true"></p-button>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
    <p class="text-center" *ngIf="filteredCustomers().length === 0">List is empty!</p>
</div>

<span class="refresh-container cursor-pointer" (click)="listCustomers()" matTooltip="Refresh">
    <p-button icon="pi pi-refresh" [rounded]="true" [text]="true" styleClass="refresh-btn"></p-button>
</span>
