<div class="analytics">
  <h2 class="page-title text-center">Sales Analytics</h2>

  <div class="stats">
    <div class="card">
      <h3>Total Sales</h3>
      <p>{{ totalSales | currency:'₹' }}</p>
    </div>

    <div class="card">
      <h3>Total Orders</h3>
      <p>{{ totalOrders }}</p>
    </div>
  </div>

  <div class="year-selector">
    <label for="year">Select Year:</label>
    <p-dropdown [options]="years" [(ngModel)]="selectedYear" placeholder="Select Year" (onChange)="onYearChange()">
    </p-dropdown>
  </div>

  <h3>Sales by state</h3>
  <div *ngIf="hasStateData">
    <div class="chart-type-wrapper flex align-items-center">
      <label for="chart">Chart Type :</label>
      <select class="cursor-pointer" [(ngModel)]="selectedChartTypeForState"
        (change)="loadStateWiseSalesChart(selectedChartTypeForState, stateWiseRevenueData)">
        <option *ngFor="let chartType of chartTypes" [value]="chartType">
          {{ chartType }}
        </option>
      </select>
    </div>
    <canvas #stateChartCanvas id="stateWiseSalesChart"></canvas>
  </div>
  <div *ngIf="!hasStateData" class="no-data-message">
    <p>No records found for {{selectedYear}}</p>
  </div>

  <h3>Sales by district</h3>
  <div *ngIf="hasDistrictData">
    <div class="chart-type-wrapper flex align-items-center">
      <label for="chart">Chart Type :</label>
      <select class="cursor-pointer" [(ngModel)]="selectedChartTypeForDistrict"
        (change)="loadDistrictWiseSalesChart(selectedChartTypeForDistrict,districtWiseRevenueData)">
        <option *ngFor="let chartType of chartTypes" [value]="chartType">
          {{ chartType }}
        </option>
      </select>
    </div>
    <canvas #districtChartCanvas id="districtWiseSalesChart"></canvas>
  </div>
  <div *ngIf="!hasDistrictData" class="no-data-message">
    <p>No records found for {{selectedYear}}</p>
  </div>
</div>


<span class="refresh-container cursor-pointer" (click)="refreshData()" matTooltip="Refresh">
  <button class="refresh-btn"><i class=" pi pi-refresh cursor-pointer"></i></button>
</span>
