<div class="analytics-container">

  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <h2><i class="pi pi-chart-bar"></i> Analytics</h2>
      <span class="year-badge">{{ selectedYear }}</span>
    </div>
    <div class="header-actions">
      <p-select [options]="years" [(ngModel)]="selectedYear" placeholder="Select Year"
        (onChange)="onYearChange()"></p-select>
      <p-button icon="pi pi-refresh" [text]="true" [rounded]="true" styleClass="refresh-icon-btn"
        (onClick)="refreshData()" matTooltip="Refresh"></p-button>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="stat-cards">
    <div class="stat-card sales">
      <div class="stat-icon"><i class="pi pi-indian-rupee"></i></div>
      <div class="stat-info">
        <p class="stat-label">Total Sales</p>
        <p class="stat-value">{{ totalSales | currency:'₹' }}</p>
      </div>
    </div>
    <div class="stat-card orders">
      <div class="stat-icon"><i class="pi pi-shopping-cart"></i></div>
      <div class="stat-info">
        <p class="stat-label">Total Orders</p>
        <p class="stat-value">{{ totalOrders }}</p>
      </div>
    </div>
  </div>

  <!-- State Chart -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">
        <i class="pi pi-map"></i>
        <span>Sales by State</span>
      </div>
      <p-select *ngIf="hasStateData" [options]="chartTypes" [(ngModel)]="selectedChartTypeForState"
        (onChange)="loadStateWiseSalesChart(selectedChartTypeForState, stateWiseRevenueData)"
        styleClass="chart-type-select">
      </p-select>
    </div>
    <div class="chart-body" *ngIf="hasStateData; else noStateData">
      <canvas #stateChartCanvas id="stateWiseSalesChart"></canvas>
    </div>
    <ng-template #noStateData>
      <div class="no-data">
        <i class="pi pi-map"></i>
        <p>No state data for {{ selectedYear }}</p>
      </div>
    </ng-template>
  </div>

  <!-- District Chart -->
  <div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">
        <i class="pi pi-map-marker"></i>
        <span>Sales by District</span>
      </div>
      <p-select *ngIf="hasDistrictData" [options]="chartTypes" [(ngModel)]="selectedChartTypeForDistrict"
        (onChange)="loadDistrictWiseSalesChart(selectedChartTypeForDistrict, districtWiseRevenueData)"
        styleClass="chart-type-select">
      </p-select>
    </div>
    <div class="chart-body" *ngIf="hasDistrictData; else noDistrictData">
      <canvas #districtChartCanvas id="districtWiseSalesChart"></canvas>
    </div>
    <ng-template #noDistrictData>
      <div class="no-data">
        <i class="pi pi-map-marker"></i>
        <p>No district data for {{ selectedYear }}</p>
      </div>
    </ng-template>
  </div>

</div>
