<div class="container flex justify-content-center align-items-center" (keydown.enter)="login()"
    [ngStyle]="{'background-image':'url(background-images/1.jpg)'}">
    <form [formGroup]="loginForm" class="login-form" (ngSubmit)="login()">
        <div class="logo-wrapper flex justify-content-center">
            <img src="logo/logo-2.jpeg" alt="Logo">
        </div>
        <h2 class="text-center">LOGIN</h2>
        <div class="username-wrapper">
            <label for="credential">User Name</label>
            <input type="text" pInputText formControlName="credential" placeholder="Please enter the user name"
                autocomplete="email">
            <small class="error"
                [ngStyle]="loginForm.get('credential')?.invalid && loginForm.get('credential')?.touched?{}:{'visibility':'hidden'}">
                Please enter user name or email</small>
        </div>
        <div class="password-wrapper">
            <label for="password">Password</label>
            <p-password formControlName="password" placeholder="Please enter the password"
                [toggleMask]="true" [feedback]="false" styleClass="w-full" inputStyleClass="w-full"></p-password>
            <small class="error"
                [ngStyle]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched?{}:{'visibility':'hidden'}">
                Please enter password </small>
        </div>
        <p-button label="Login" [disabled]="loginForm.invalid" type="submit" styleClass="w-full"></p-button>
    </form>
</div>
